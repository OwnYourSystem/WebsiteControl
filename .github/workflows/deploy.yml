
name: Deploy to WordPress
on:
  push:
    branches: [main]
    paths:
      - 'content/pages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed page files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/pages/*.html' | tr '\n' ' ')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Deploy to WordPress
        if: steps.changed.outputs.files != ''
        env:
          WP_SITE_URL: https://ownyoursystem.com
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node deploy.mjs

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages-manifest.json
          git diff --staged --quiet || git commit -m "chore: update pages-manifest [skip ci]"
          git push
